openapi: "3.0.3"
info:
  title: "PM 세이프라인 라우팅 API"
  description: |
    개인형 이동장치(PM: 전동킥보드·자전거) 이용자를 위한 **연속주행 안전 경로 탐색** API.
    최단거리 대신 자전거도로 연속성과 위험 도로구조를 반영한 경로를 제공한다(PROJECT.md §1·§2).

    - 비용함수는 IRL(Bradley-Terry)로 학습한 가중치 w1~w5 의 가중합을 GraphHopper CustomModel 로 스칼라화(§2.2).
    - `turn_costs` 기반 edge-based 탐색으로 도로유형 전환 상태를 반영(§2.3).
    - 후보 경로별 연속주행 안전 점수·지표를 함께 반환(§1.4).
  version: "1.0.0"
servers:
  - url: "http://localhost:8080"
    description: "로컬 개발 서버"
tags:
  - name: routing
    description: "경로 탐색"
  - name: system
    description: "상태 확인"
paths:
  /health:
    get:
      tags: [system]
      summary: "헬스체크"
      description: "서버 상태와 라우팅 엔진 로드 여부를 반환한다. `engine=false` 면 OSM 미설정으로 /route 는 503."
      responses:
        "200":
          description: "정상"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                active:
                  summary: "엔진 활성"
                  value: { status: "ok", engine: true }
                disabled:
                  summary: "엔진 비활성(OSM 미설정)"
                  value: { status: "ok", engine: false }
  /route:
    post:
      tags: [routing]
      summary: "안전 경로 탐색"
      description: |
        출발지·목적지 좌표(WGS84)를 받아 연속주행 안전 경로 후보를 반환한다.
        `weights` 를 생략하면 서버 기본(IRL 학습) 가중치를 사용한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteRequest"
            examples:
              충남대_대전시청:
                summary: "충남대 → 대전시청 (기본 가중치, 후보 3)"
                value:
                  fromLat: 36.3664
                  fromLon: 127.3447
                  toLat: 36.3504
                  toLon: 127.3845
                  alternatives: 3
              거리우선:
                summary: "거리 우선(w1 강조)"
                value:
                  fromLat: 36.3664
                  fromLon: 127.3447
                  toLat: 36.3504
                  toLon: 127.3845
                  weights: { distanceWeight: 5.0, arterialPenalty: 0.0, transitionPenalty: 0.0, crossingPenalty: 0.0, busOverlapPenalty: 0.0 }
      responses:
        "200":
          description: "경로 후보 목록(스칼라 비용 오름차순)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteResponse"
        "400":
          description: "잘못된 요청(가중치 음수 등)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              examples:
                invalid: { value: { error: "invalid_argument", detail: "가중치는 음수가 될 수 없습니다" } }
        "422":
          description: "경로 탐색 실패(연결 없음 등)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              examples:
                failed: { value: { error: "routing_failed", detail: "Connection between locations not found" } }
        "503":
          description: "라우팅 엔진 비활성(PM_OSM_FILE 미설정)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              examples:
                disabled: { value: { error: "engine_unavailable", detail: "routing.osmFile 미설정으로 엔진이 비활성 상태입니다." } }
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, engine]
      properties:
        status: { type: string, example: "ok" }
        engine:
          type: boolean
          description: "라우팅 엔진 로드 여부"
          example: true
    RouteRequest:
      type: object
      required: [fromLat, fromLon, toLat, toLon]
      properties:
        fromLat: { type: number, format: double, description: "출발지 위도", example: 36.3664 }
        fromLon: { type: number, format: double, description: "출발지 경도", example: 127.3447 }
        toLat:   { type: number, format: double, description: "목적지 위도", example: 36.3504 }
        toLon:   { type: number, format: double, description: "목적지 경도", example: 127.3845 }
        weights:
          allOf:
            - $ref: "#/components/schemas/WeightsDto"
          nullable: true
          description: "생략 시 서버 기본(IRL) 가중치 사용"
        alternatives:
          type: integer
          minimum: 1
          maximum: 10
          nullable: true
          description: "반환할 후보 경로 수(§2.4). 생략 시 서버 기본값(3)."
          example: 3
    WeightsDto:
      type: object
      description: "비용함수 가중치(모두 ≥0). cost = w1·거리 + w2·차도 + w3·전환 + w4·교차로 + w5·버스겹침 (§2.2)"
      properties:
        distanceWeight:    { type: number, format: double, description: "w1 거리(클수록 짧은 경로 선호)", default: 1.0 }
        arterialPenalty:   { type: number, format: double, description: "w2 차도/간선 회피", default: 3.0 }
        transitionPenalty: { type: number, format: double, description: "w3 도로유형 전환(자전거도로 단절) 페널티", default: 2.0 }
        crossingPenalty:   { type: number, format: double, description: "w4 교차로/연결로 페널티", default: 1.5 }
        busOverlapPenalty: { type: number, format: double, description: "w5 버스노선 겹침 페널티", default: 1.0 }
    RouteResponse:
      type: object
      required: [routes]
      properties:
        routes:
          type: array
          items: { $ref: "#/components/schemas/RouteDto" }
    RouteDto:
      type: object
      required: [distanceMeters, durationMillis, weight, safetyScore, geometry, metrics]
      properties:
        distanceMeters: { type: number, format: double, description: "총 거리(m)", example: 6502.4 }
        durationMillis: { type: integer, format: int64, description: "예상 소요시간(ms)", example: 1488000 }
        weight:         { type: number, format: double, description: "스칼라 탐색 비용(낮을수록 우선)", example: 1845.8 }
        safetyScore:    { type: number, format: double, description: "연속주행 안전 점수(0~100, 높을수록 안전)", example: 36.0 }
        geometry:
          type: array
          description: "경로 폴리라인. [경도, 위도] 순서(GeoJSON 관례)."
          items:
            type: array
            items: { type: number, format: double }
            minItems: 2
            maxItems: 2
          example: [[127.3447, 36.3664], [127.3450, 36.3660]]
        metrics: { $ref: "#/components/schemas/RouteMetrics" }
    RouteMetrics:
      type: object
      required: [bikeInfraRatio, transitionCount]
      properties:
        bikeInfraRatio:  { type: number, format: double, description: "자전거도로 이용 비율(0~1)", example: 0.17 }
        transitionCount: { type: integer, description: "도로유형 전환 횟수", example: 9 }
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:  { type: string, description: "에러 코드", example: "engine_unavailable" }
        detail: { type: string, nullable: true, description: "상세 메시지" }
